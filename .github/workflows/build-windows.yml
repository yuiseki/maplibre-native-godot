name: Build Windows x86_64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MLN_REPO: maplibre/maplibre-native
  MLN_BRANCH: main
  GODOT_CPP_BRANCH: godot-4.3-stable

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Checkout maplibre-native-godot
        uses: actions/checkout@v4

      - name: Configure MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        run: choco install ninja

      - name: Checkout maplibre-native
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MLN_REPO }}
          ref: ${{ env.MLN_BRANCH }}
          path: maplibre-native
          submodules: recursive

      - name: Get maplibre-native commit SHA
        id: mln-sha
        shell: bash
        run: echo "sha=$(git -C maplibre-native rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache maplibre-native build
        id: cache-mln
        uses: actions/cache@v5
        with:
          path: |
            build/maplibre-native-windows
            maplibre-native/vendor/wgpu-native/target/release/wgpu_native.dll
            maplibre-native/vendor/wgpu-native/target/x86_64-pc-windows-msvc/release/wgpu_native.dll
            maplibre-native/vendor/wgpu-native/target/x86_64-pc-windows-msvc/release/wgpu_native.dll.lib
            maplibre-native/platform/windows/vendor/vcpkg/installed
          key: mln-windows-${{ steps.mln-sha.outputs.sha }}-v7

      - name: Setup Rust
        if: steps.cache-mln.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Export vcpkg binary cache credentials
        if: steps.cache-mln.outputs.cache-hit != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout godot-cpp
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot-cpp
          ref: ${{ env.GODOT_CPP_BRANCH }}
          path: third_party/godot-cpp
          submodules: true

      - name: Cache godot-cpp build
        id: cache-godot-cpp
        uses: actions/cache@v5
        with:
          path: build/godot-extension-windows/godot-cpp
          key: godot-cpp-windows-${{ env.GODOT_CPP_BRANCH }}-Release

      - name: Build maplibre-native
        if: steps.cache-mln.outputs.cache-hit != 'true'
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\lib
        run: |
          cmake -S maplibre-native `
            -B build/maplibre-native-windows `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_HOST_TRIPLET=x64-windows `
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/maplibre-native/platform/windows/vendor/vcpkg-custom-triplets" `
            -DMLN_WITH_WEBGPU=ON `
            -DMLN_WEBGPU_IMPL_WGPU=ON `
            -DMLN_CREATE_AMALGAMATION=OFF `
            -DMLN_WITH_GLFW=OFF `
            -DMLN_WITH_QT=OFF `
            -DMLN_WITH_TESTS=OFF `
            -DMLN_WITH_BENCHMARKS=OFF `
            -DMLN_WITH_RENDER_TESTS=OFF
          cmake --build build/maplibre-native-windows --target mbgl-core --parallel

      # Locate where maplibre-native's vcpkg installed ICU.
      # Get-VendorPackages.ps1 uses maplibre-native's internal vcpkg (mounted as a
      # virtual drive) and installs packages to vendor/vcpkg/installed/.
      - name: Locate ICU libs after maplibre-native build
        if: steps.cache-mln.outputs.cache-hit != 'true'
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "=== Searching for ICU libs ==="
          $paths = @(
            "maplibre-native/platform/windows/vendor/vcpkg/installed/x64-windows/lib",
            "maplibre-native/vcpkg_installed/x64-windows/lib",
            "build/maplibre-native-windows/vcpkg_installed/x64-windows/lib",
            "C:/vcpkg/installed/x64-windows/lib"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $icu = Get-ChildItem $p -Filter "icu*.lib" -ErrorAction SilentlyContinue
              if ($icu) { Write-Host "FOUND ICU at $p : $($icu.Name -join ', ')" }
              else       { Write-Host "$p exists but no ICU libs" }
            } else {
              Write-Host "$p does not exist"
            }
          }
          Write-Host "=== MapboxCoreTargets ICU references ==="
          if (Test-Path "build/maplibre-native-windows/MapboxCoreTargets.cmake") {
            Select-String -Path "build/maplibre-native-windows/MapboxCoreTargets.cmake" -Pattern "ICU" |
              ForEach-Object { Write-Host $_.Line }
          } else {
            Write-Host "MapboxCoreTargets.cmake not found"
          }

      # dlfcn-win32, libuv, libpng, zlib are GDExtension-only deps not pulled
      # in by maplibre-native. ICU is intentionally excluded: maplibre-native's
      # own vcpkg installs ICU 74 (matching mbgl-core.lib); running
      # 'vcpkg install icu' would upgrade it to a newer version causing LNK2019.
      - name: Install GDExtension vcpkg dependencies
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            dlfcn-win32:x64-windows `
            libuv:x64-windows `
            libpng:x64-windows `
            zlib:x64-windows

      - name: Build GDExtension (Release)
        run: |
          cmake -S . `
            -B build/godot-extension-windows `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_MODE=OFF `
            "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/maplibre-native/platform/windows/vendor/vcpkg/installed/x64-windows;$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows" `
            -DMLN_SOURCE_DIR="${{ github.workspace }}/maplibre-native" `
            -DMLN_BUILD_DIR="${{ github.workspace }}/build/maplibre-native-windows" `
            "-DCMAKE_CXX_FLAGS_DEBUG=/MDd /Zi /Ob0 /Od /RTC1"
          cmake --build build/godot-extension-windows --parallel

      - name: Verify built binaries
        run: Get-ChildItem addons/maplibre_native_godot/bin/ -Filter *.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            addons/maplibre_native_godot/bin/*windows*
            addons/maplibre_native_godot/bin/wgpu_native.dll
          retention-days: 7
