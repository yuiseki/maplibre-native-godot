name: Build Linux x86_64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MLN_REPO: maplibre/maplibre-native
  MLN_BRANCH: main
  GODOT_CPP_BRANCH: godot-4.3-stable

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout maplibre-native-godot
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build python3 \
            libssl-dev libcurl4-openssl-dev libuv1-dev \
            libpng-dev libjpeg-dev libwebp-dev libbz2-dev zlib1g-dev \
            libicu-dev libgl1-mesa-dev libvulkan-dev

      - name: Checkout maplibre-native
        uses: actions/checkout@v6
        with:
          repository: ${{ env.MLN_REPO }}
          ref: ${{ env.MLN_BRANCH }}
          path: maplibre-native
          submodules: recursive

      - name: Get maplibre-native commit SHA
        id: mln-sha
        run: echo "sha=$(git -C maplibre-native rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache maplibre-native build
        id: cache-mln
        uses: actions/cache@v5
        with:
          path: |
            build/maplibre-native-linux
            maplibre-native/vendor/wgpu-native/target/x86_64-unknown-linux-gnu/release/libwgpu_native.a
          key: mln-linux-${{ steps.mln-sha.outputs.sha }}

      - name: Install Rust toolchain
        if: steps.cache-mln.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout godot-cpp
        uses: actions/checkout@v6
        with:
          repository: godotengine/godot-cpp
          ref: ${{ env.GODOT_CPP_BRANCH }}
          path: third_party/godot-cpp
          submodules: true

      - name: Cache godot-cpp build
        id: cache-godot-cpp
        uses: actions/cache@v5
        with:
          path: build/godot-extension-linux/godot-cpp
          key: godot-cpp-linux-${{ env.GODOT_CPP_BRANCH }}-RelWithDebInfo

      - name: Build maplibre-native
        if: steps.cache-mln.outputs.cache-hit != 'true'
        run: |
          cmake -S maplibre-native \
            -B build/maplibre-native-linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DMLN_WITH_WEBGPU=ON \
            -DMLN_WEBGPU_IMPL_WGPU=ON \
            -DMLN_CREATE_AMALGAMATION=OFF \
            -DMLN_WITH_GLFW=OFF \
            -DMLN_WITH_QT=OFF \
            -DMLN_WITH_TESTS=OFF \
            -DMLN_WITH_BENCHMARKS=OFF \
            -DMLN_WITH_RENDER_TESTS=OFF \
            -DCMAKE_CXX_FLAGS="-Wno-error=shadow"
          cmake --build build/maplibre-native-linux --target mbgl-core --parallel

      - name: Build GDExtension (Release)
        run: |
          cmake -S . \
            -B build/godot-extension-linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMLN_SOURCE_DIR=${{ github.workspace }}/maplibre-native \
            -DMLN_BUILD_DIR=${{ github.workspace }}/build/maplibre-native-linux
          cmake --build build/godot-extension-linux --parallel

      - name: Verify built binaries
        run: |
          ls -la addons/maplibre_native_godot/bin/
          file addons/maplibre_native_godot/bin/*.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: addons/maplibre_native_godot/bin/*linux*
          retention-days: 7
