name: Build macOS arm64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MLN_REPO: maplibre/maplibre-native
  MLN_BRANCH: main
  GODOT_CPP_BRANCH: godot-4.3-stable

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - name: Checkout maplibre-native-godot
        uses: actions/checkout@v6

      - name: Install system packages
        run: brew install cmake ninja pkg-config libuv

      - name: Checkout maplibre-native
        uses: actions/checkout@v6
        with:
          repository: ${{ env.MLN_REPO }}
          ref: ${{ env.MLN_BRANCH }}
          path: maplibre-native
          submodules: recursive

      - name: Get maplibre-native commit SHA
        id: mln-sha
        run: echo "sha=$(git -C maplibre-native rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache maplibre-native build
        id: cache-mln
        uses: actions/cache@v5
        with:
          path: |
            build/maplibre-native-macos
            maplibre-native/vendor/wgpu-native/target/release/libwgpu_native.dylib
            maplibre-native/vendor/wgpu-native/target/release/deps/libwgpu_native.dylib
          key: mln-macos-${{ steps.mln-sha.outputs.sha }}

      - name: Install Rust toolchain
        if: steps.cache-mln.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout godot-cpp
        uses: actions/checkout@v6
        with:
          repository: godotengine/godot-cpp
          ref: ${{ env.GODOT_CPP_BRANCH }}
          path: third_party/godot-cpp
          submodules: true

      - name: Cache godot-cpp build
        id: cache-godot-cpp
        uses: actions/cache@v5
        with:
          path: build/godot-extension-macos/godot-cpp
          key: godot-cpp-macos-${{ env.GODOT_CPP_BRANCH }}-RelWithDebInfo

      - name: Build maplibre-native
        if: steps.cache-mln.outputs.cache-hit != 'true'
        run: |
          cmake -S maplibre-native \
            -B build/maplibre-native-macos \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMLN_WITH_WEBGPU=ON \
            -DMLN_WEBGPU_IMPL_WGPU=ON \
            -DMLN_CREATE_AMALGAMATION=OFF \
            -DMLN_WITH_GLFW=OFF \
            -DMLN_WITH_QT=OFF \
            -DMLN_WITH_TESTS=OFF \
            -DMLN_WITH_BENCHMARKS=OFF \
            -DMLN_WITH_RENDER_TESTS=OFF \
            -DCMAKE_CXX_FLAGS="-Wno-error=shadow"
          cmake --build build/maplibre-native-macos --target mbgl-core --parallel

      - name: Build GDExtension (Release)
        run: |
          cmake -S . \
            -B build/godot-extension-macos \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMLN_SOURCE_DIR=${{ github.workspace }}/maplibre-native \
            -DMLN_BUILD_DIR=${{ github.workspace }}/build/maplibre-native-macos
          cmake --build build/godot-extension-macos --parallel

      - name: Verify built binaries
        run: |
          ls -la addons/maplibre_native_godot/bin/
          file addons/maplibre_native_godot/bin/*.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: |
            addons/maplibre_native_godot/bin/*macos*
            addons/maplibre_native_godot/bin/libwgpu_native.dylib
          retention-days: 7
